# Prometheus scrape config for Face Recognition System
# Save as: prometheus.yml
# Run: docker run -p 9090:9090 -v ./prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'face-recognition'
    static_configs:
      - targets: ['host.docker.internal:5000']  # Flask app
    metrics_path: '/metrics'
    scrape_interval: 5s
